name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 改用 18 版本，pkg 支持最稳

      - name: Install Dependencies
        run: |
          npm install
          npm install -g pkg

      - name: Package Application
        run: |
          # 明确指定使用 node18 的 linux 环境进行打包
          pkg index.js --targets node18-linux-x64 --output server.jar

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }} # 每次运行生成一个新的版本号
          name: Release v${{ github.run_number }}
          files: server.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
